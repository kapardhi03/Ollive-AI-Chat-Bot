models:
  openai:
    default: "gpt-4-turbo-preview"
    alternatives:
      - "gpt-4-turbo-preview"
      - "gpt-4"
      - "gpt-3.5-turbo"
    api_base: "https://api.openai.com/v1"

  anthropic:
    default: "claude-3-sonnet-20240229"
    alternatives:
      - "claude-3-sonnet-20240229"
      - "claude-3-haiku-20240307"
    api_base: "https://api.anthropic.com"

  google:
    default: "gemini-pro"
    alternatives:
      - "gemini-pro"
      - "gemini-pro-vision"
    api_base: "https://generativelanguage.googleapis.com"

  deepseek:
    default: "deepseek-chat"
    alternatives:
      - "deepseek-chat"
      - "deepseek-coder"
    api_base: "https://api.deepseek.com/v1"

inference:
  temperature: 0.7
  max_tokens: 500
  top_p: 0.9

memory:
  max_turns: 10
  context_window: 8000

interface:
  title: "Frontier AI Assistant"
  icon: "🚀"
  description: "Powered by frontier models (GPT-4, Claude, Gemini)"

rate_limiting:
  requests_per_minute: 60
  requests_per_hour: 1000

cost_tracking:
  enabled: true
  budget_limit: 10.0  # USD
  alert_threshold: 0.8

logging:
  level: "INFO"
  file: "logs/frontier_assistant.log"