model:
  name: "unsloth/Llama-3.2-1B-Instruct"
  alternatives:
    - "unsloth/Llama-3.2-1B-Instruct"
    - "microsoft/Phi-3-mini-4k-instruct"
    - "Qwen/Qwen2.5-0.5B-Instruct"
    - "mistralai/Mistral-7B-Instruct-v0.3"

inference:
  temperature: 0.7
  max_tokens: 200
  do_sample: true
  top_p: 0.9
  repetition_penalty: 1.1

memory:
  max_turns: 10
  context_window: 4000

interface:
  title: "OSS AI Assistant"
  icon: "🤖"
  description: "Powered by open-source models"

deployment:
  device: "auto"  # "cuda", "cpu", or "auto"
  torch_dtype: "float16"
  load_in_8bit: false
  load_in_4bit: false

logging:
  level: "INFO"
  file: "logs/oss_assistant.log"